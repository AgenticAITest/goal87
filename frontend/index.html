<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOP87 Bola</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0d0d0d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        animation: splashFadeOut 0.5s ease-in-out 2s forwards;
      }
      #splash img {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        animation: splashLogoIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
      }
      #splash p {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #9a7a3a;
        animation: splashTextIn 0.5s ease-out 0.6s both;
        margin: 0;
      }
      @keyframes splashLogoIn {
        from { transform: scale(0.7); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }
      @keyframes splashTextIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0);   }
      }
      @keyframes splashFadeOut {
        from { opacity: 1; }
        to   { opacity: 0; pointer-events: none; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/logo.png" alt="TOP87 Bola" />
      <p>Forever Young, Forever Friends</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
