server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every path serves index.html so React Router handles routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_types
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;
}
