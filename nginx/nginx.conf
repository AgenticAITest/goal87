server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets — cache aggressively (filenames change on each build)
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — every path serves index.html so React Router handles routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_types
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;
}
